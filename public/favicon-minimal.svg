<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Luca Pagano portfolio icon</title>
  <desc id="desc">Minimal artistic LP monogram with a dark editorial background and a subtle technical accent.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="48" x2="416" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1017"/>
      <stop offset="0.54" stop-color="#07090D"/>
      <stop offset="1" stop-color="#101219"/>
    </linearGradient>
    <radialGradient id="quietLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(318 160) rotate(126) scale(260 190)">
      <stop stop-color="#E9E3D2" stop-opacity="0.12"/>
      <stop offset="0.56" stop-color="#E9E3D2" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#E9E3D2" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.045"/>
      </feComponentTransfer>
    </filter>
    <filter id="softInk" x="90" y="88" width="340" height="340" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#bg)"/>
  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#quietLight)"/>
  <rect x="28.5" y="28.5" width="455" height="455" rx="111.5" stroke="#F0E8D8" stroke-opacity="0.08"/>
  <rect x="28" y="28" width="456" height="456" rx="112" filter="url(#grain)" opacity="0.75"/>

  <g filter="url(#softInk)" stroke-linecap="round" stroke-linejoin="round">
    <!-- L: still, architectural, almost editorial -->
    <path d="M166 365V139" stroke="#F1EBDD" stroke-width="20"/>
    <path d="M166 365H317" stroke="#F1EBDD" stroke-width="20"/>

    <!-- P: open, imperfect arc rather than a literal tech logo -->
    <path d="M211 144C270 120 339 134 363 186C389 241 348 294 282 292C248 291 222 279 204 258" stroke="#F1EBDD" stroke-width="20"/>

    <!-- small signature cut: subtle, not decorative noise -->
    <path d="M334 337L368 301" stroke="#9FD8D9" stroke-width="8" stroke-opacity="0.78"/>
  </g>

  <!-- quiet asymmetric crop marks, visible only at larger sizes -->
  <path d="M118 119H145" stroke="#F1EBDD" stroke-opacity="0.18" stroke-width="3" stroke-linecap="round"/>
  <path d="M367 394H395" stroke="#F1EBDD" stroke-opacity="0.13" stroke-width="3" stroke-linecap="round"/>
</svg>
